<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Administrar catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FAF7F2;--surface:#FFF;--ink:#2A2320;--muted:#8A7E74;--gold:#B08D57;--wine:#5B2A3E;--line:#EAE1D5;--soft:#F2EBE0;--ok:#25806b;--err:#b04a4a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none}
  input,textarea,select{font-family:inherit}
  .serif{font-family:'Cormorant Garamond',serif}
  a{color:var(--gold)}

  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(42,35,32,.06)}
  .login h1{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--wine);text-align:center;margin-bottom:4px}
  .login p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
  .field{margin-bottom:14px}
  .field label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500}
  .field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
  .btn{width:100%;padding:13px;background:var(--wine);color:#fff;border-radius:10px;font-size:14.5px;font-weight:600;transition:background .15s}
  .btn:hover{background:#4a2232}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:12px;display:none}
  .msg.err{display:block;background:#fbeaea;color:var(--err)}
  .msg.ok{display:block;background:#e7f4f0;color:var(--ok)}

  /* App */
  .app{display:none;max-width:1080px;margin:0 auto;padding:24px 20px 80px}
  .top{display:flex;align-items:center;gap:14px;margin-bottom:26px;flex-wrap:wrap}
  .top .serif{font-size:28px;color:var(--wine);flex:1}
  .top .who{font-size:12.5px;color:var(--muted)}
  .ghost{padding:9px 16px;background:var(--surface);border:1px solid var(--line);border-radius:100px;font-size:13px;font-weight:500;color:var(--ink)}
  .ghost:hover{border-color:var(--gold)}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
  .panel h2{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--wine);margin-bottom:16px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  textarea{resize:vertical;min-height:70px}
  .check{display:flex;align-items:center;gap:8px;margin:6px 0 14px}
  .check input{width:auto}
  .check label{font-size:13.5px;color:var(--ink);margin:0}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
  .drop:hover{border-color:var(--gold);color:var(--ink)}
  .drop.has{padding:8px}
  .drop img{max-height:120px;border-radius:8px;margin:0 auto}
  .form-actions{display:flex;gap:10px;margin-top:6px}
  .form-actions .btn{flex:1}
  .cancel{padding:13px;background:var(--soft);color:var(--ink);border-radius:10px;font-size:14px;font-weight:500;display:none}

  /* Lista */
  .list-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .list-head .serif{font-size:22px;color:var(--wine);flex:1}
  .list-search{padding:9px 13px;border:1px solid var(--line);border-radius:100px;font-size:13px;outline:none;width:180px}
  .prod{display:flex;gap:14px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;align-items:center}
  .prod img,.prod .noimg{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--soft);flex-shrink:0}
  .prod .noimg{display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.5;font-size:11px}
  .prod .info{flex:1;min-width:0}
  .prod .info h3{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--ink);line-height:1.1}
  .prod .info .sub{font-size:12.5px;color:var(--muted)}
  .prod .info .tags{font-size:11px;color:var(--gold);margin-top:2px}
  .prod .pr{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;white-space:nowrap}
  .prod .acts{display:flex;gap:6px}
  .icon{width:34px;height:34px;border-radius:8px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s}
  .icon:hover{background:var(--line);color:var(--ink)}
  .icon.del:hover{background:#fbeaea;color:var(--err)}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .serif{font-size:22px;color:var(--ink);display:block;margin-bottom:4px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;margin:30px auto;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login">
    <h1 id="loginBrand">Panel</h1>
    <p>Ingresa para administrar el catálogo</p>
    <div class="field">
      <label for="email">Correo</label>
      <input id="email" type="email" placeholder="tucorreo@ejemplo.com" autocomplete="username" />
    </div>
    <div class="field">
      <label for="pass">Contraseña</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn">Ingresar</button>
    <div class="msg" id="loginMsg"></div>
    <p style="margin-top:16px;font-size:11.5px">¿Sin cuenta aún? Créala en Supabase → Authentication → Users → Add user.</p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="top">
    <span class="serif" id="appBrand">Administrar catálogo</span>
    <span class="who" id="who"></span>
    <a class="ghost" href="index.html" target="_blank">Ver catálogo ↗</a>
    <button class="ghost" id="logout">Salir</button>
  </div>

  <div class="layout">
    <!-- Formulario -->
    <div class="panel">
      <h2 id="formTitle">Nuevo producto</h2>
      <input type="hidden" id="editId" />
      <div class="field">
        <label>Nombre *</label>
        <input id="f_nombre" placeholder="Ej. Sauvage EDP" />
      </div>
      <div class="two">
        <div class="field"><label>Marca</label><input id="f_marca" placeholder="Dior" /></div>
        <div class="field"><label>Tamaño (ml)</label><input id="f_ml" type="number" step="0.5" placeholder="5" /></div>
      </div>
      <div class="field">
        <label>Descripción / notas</label>
        <textarea id="f_desc" placeholder="Bergamota, pimienta, ambroxan…"></textarea>
      </div>
      <div class="two">
        <div class="field"><label>Categoría</label><input id="f_cat" list="cats" placeholder="Diseñador" /><datalist id="cats"></datalist></div>
        <div class="field"><label>Género</label>
          <select id="f_gen"><option value="">—</option><option>Masculino</option><option>Femenino</option><option>Unisex</option></select>
        </div>
      </div>
      <div class="two">
        <div class="field"><label>Precio *</label><input id="f_precio" type="number" step="0.01" placeholder="35" /></div>
        <div class="field"><label>Stock</label><input id="f_stock" type="number" placeholder="10" /></div>
      </div>
      <div class="check"><input type="checkbox" id="f_dest" /><label for="f_dest">Marcar como destacado</label></div>
      <div class="field">
        <label>Imagen</label>
        <div class="drop" id="drop">Toca para subir una foto<br><small>JPG o PNG</small></div>
        <input type="file" id="f_img" accept="image/*" hidden />
        <input type="hidden" id="f_imgurl" />
      </div>
      <div class="form-actions">
        <button class="btn" id="saveBtn">Guardar producto</button>
        <button class="cancel" id="cancelBtn">Cancelar</button>
      </div>
      <div class="msg" id="formMsg"></div>
    </div>

    <!-- Lista -->
    <div>
      <div class="list-head">
        <span class="serif">Productos</span>
        <input class="list-search" id="listSearch" placeholder="Buscar…" />
      </div>
      <div id="list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const money = n => CONFIG.MONEDA + " " + (Math.round(n*100)/100).toLocaleString('es-PE');
const $ = id => document.getElementById(id);
document.title = "Admin · " + CONFIG.TIENDA_NOMBRE;
$('loginBrand').textContent = CONFIG.TIENDA_NOMBRE;
$('appBrand').textContent = CONFIG.TIENDA_NOMBRE;
let PRODUCTS = [], pendingFile = null;

/* ---- Auth ---- */
async function checkSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showApp(session.user.email); } else { $('loginWrap').style.display='flex'; $('app').style.display='none'; }
}
$('loginBtn').onclick = async ()=>{
  const email=$('email').value.trim(), password=$('pass').value;
  if(!email||!password){ return showMsg('loginMsg','Completa correo y contraseña','err'); }
  $('loginBtn').disabled=true; $('loginBtn').textContent='Ingresando…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $('loginBtn').disabled=false; $('loginBtn').textContent='Ingresar';
  if(error){ showMsg('loginMsg', error.message==='Invalid login credentials'?'Correo o contraseña incorrectos':error.message,'err'); }
  else { showApp(email); }
};
$('pass').addEventListener('keydown',e=>{ if(e.key==='Enter') $('loginBtn').click(); });
$('logout').onclick = async ()=>{ await sb.auth.signOut(); location.reload(); };

function showApp(email){
  $('loginWrap').style.display='none'; $('app').style.display='block';
  $('who').textContent = email;
  loadProducts();
}

/* ---- Cargar productos ---- */
async function loadProducts(){
  $('list').innerHTML = '<div class="spinner"></div>';
  const { data, error } = await sb.from('productos').select('*').order('created_at',{ascending:false});
  if(error){ $('list').innerHTML = `<div class="empty"><span class="serif">Error al cargar</span>${error.message}</div>`; return; }
  PRODUCTS = data||[];
  const cats=[...new Set(PRODUCTS.map(p=>p.categoria).filter(Boolean))];
  $('cats').innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');
  renderList();
}
function renderList(){
  const q = $('listSearch').value.toLowerCase().trim();
  const list = PRODUCTS.filter(p=> !q || (p.nombre+' '+(p.marca||'')).toLowerCase().includes(q));
  if(!list.length){ $('list').innerHTML = `<div class="empty"><span class="serif">${PRODUCTS.length?'Sin coincidencias':'Aún no hay productos'}</span>${PRODUCTS.length?'':'Crea el primero con el formulario.'}</div>`; return; }
  $('list').innerHTML = list.map(p=>{
    const img = p.imagen_url?`<img src="${p.imagen_url}" alt="">`:`<div class="noimg">sin foto</div>`;
    return `<div class="prod">
      ${img}
      <div class="info">
        <h3>${esc(p.nombre)} ${p.destacado?'★':''}</h3>
        <div class="sub">${esc(p.marca||'—')}${p.ml?' · '+p.ml+'ml':''} · stock ${p.stock??0}</div>
        <div class="tags">${[p.categoria,p.genero].filter(Boolean).map(esc).join(' · ')}</div>
      </div>
      <div class="pr">${money(p.precio)}</div>
      <div class="acts">
        <button class="icon" title="Editar" onclick="editProduct('${p.id}')">✎</button>
        <button class="icon del" title="Eliminar" onclick="delProduct('${p.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}
$('listSearch').oninput = renderList;

/* ---- Imagen ---- */
$('drop').onclick = ()=> $('f_img').click();
$('f_img').onchange = e=>{
  const file = e.target.files[0]; if(!file) return;
  pendingFile = file;
  const url = URL.createObjectURL(file);
  $('drop').classList.add('has');
  $('drop').innerHTML = `<img src="${url}" alt="preview">`;
};

/* ---- Guardar ---- */
$('saveBtn').onclick = async ()=>{
  const nombre=$('f_nombre').value.trim();
  const precio=parseFloat($('f_precio').value);
  if(!nombre){ return showMsg('formMsg','El nombre es obligatorio','err'); }
  if(isNaN(precio)){ return showMsg('formMsg','Ingresa un precio válido','err'); }
  $('saveBtn').disabled=true; $('saveBtn').textContent='Guardando…';

  try{
    let imagen_url = $('f_imgurl').value || null;
    if(pendingFile){
      const ext = pendingFile.name.split('.').pop();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const { error:upErr } = await sb.storage.from('productos').upload(path, pendingFile);
      if(upErr) throw upErr;
      imagen_url = sb.storage.from('productos').getPublicUrl(path).data.publicUrl;
    }
    const payload = {
      nombre,
      marca: $('f_marca').value.trim()||null,
      descripcion: $('f_desc').value.trim()||null,
      categoria: $('f_cat').value.trim()||null,
      genero: $('f_gen').value||null,
      ml: $('f_ml').value?parseFloat($('f_ml').value):null,
      precio,
      stock: $('f_stock').value?parseInt($('f_stock').value):0,
      destacado: $('f_dest').checked,
      imagen_url
    };
    const editId = $('editId').value;
    let error;
    if(editId){ ({ error } = await sb.from('productos').update(payload).eq('id', editId)); }
    else { ({ error } = await sb.from('productos').insert(payload)); }
    if(error) throw error;
    showMsg('formMsg', editId?'Producto actualizado':'Producto agregado','ok');
    resetForm();
    loadProducts();
  }catch(err){ showMsg('formMsg', err.message||'Ocurrió un error','err'); }
  finally{ $('saveBtn').disabled=false; $('saveBtn').textContent='Guardar producto'; }
};

function editProduct(id){
  const p = PRODUCTS.find(x=>x.id===id); if(!p) return;
  $('editId').value=p.id; $('f_nombre').value=p.nombre||''; $('f_marca').value=p.marca||'';
  $('f_desc').value=p.descripcion||''; $('f_cat').value=p.categoria||''; $('f_gen').value=p.genero||'';
  $('f_ml').value=p.ml??''; $('f_precio').value=p.precio??''; $('f_stock').value=p.stock??'';
  $('f_dest').checked=!!p.destacado; $('f_imgurl').value=p.imagen_url||''; pendingFile=null;
  if(p.imagen_url){ $('drop').classList.add('has'); $('drop').innerHTML=`<img src="${p.imagen_url}">`; }
  else { resetDrop(); }
  $('formTitle').textContent='Editar producto'; $('cancelBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
async function delProduct(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${p?.nombre}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('productos').delete().eq('id', id);
  if(error) return alert(error.message);
  loadProducts();
}
$('cancelBtn').onclick = resetForm;
function resetForm(){
  $('editId').value=''; ['f_nombre','f_marca','f_desc','f_cat','f_ml','f_precio','f_stock','f_imgurl'].forEach(i=>$(i).value='');
  $('f_gen').value=''; $('f_dest').checked=false; pendingFile=null;
  resetDrop(); $('formTitle').textContent='Nuevo producto'; $('cancelBtn').style.display='none';
}
function resetDrop(){ $('drop').classList.remove('has'); $('drop').innerHTML='Toca para subir una foto<br><small>JPG o PNG</small>'; $('f_img').value=''; }

function showMsg(id,text,type){ const el=$(id); el.textContent=text; el.className='msg '+type; if(type==='ok') setTimeout(()=>el.className='msg',2500); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

checkSession();
</script>
</body>
</html>
